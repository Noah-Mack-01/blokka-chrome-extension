<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Interceptor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Network Interceptor</h1>
    </header>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="requests">Requests</button>
      <button class="tab-btn" data-tab="rules">Rules</button>
    </nav>

    <!-- Requests Tab -->
    <div id="requests-tab" class="tab-content active">
      <div class="toolbar">
        <button id="clear-requests" class="btn btn-secondary">Clear</button>
        <span id="request-count" class="count">0 requests</span>
      </div>
      <div id="requests-list" class="list">
        <div class="empty-state">No intercepted requests yet</div>
      </div>
    </div>

    <!-- Rules Tab -->
    <div id="rules-tab" class="tab-content">
      <div class="toolbar">
        <button id="add-rule" class="btn btn-primary">+ Add Rule</button>
      </div>

      <!-- Add/Edit Rule Form -->
      <div id="rule-form" class="form hidden">
        <h3 id="form-title">Add New Rule</h3>
        <div class="form-group">
          <label for="rule-pattern">URL Pattern</label>
          <input type="text" id="rule-pattern" placeholder="e.g., *://example.com/*" required>
          <small>Use * as wildcard</small>
        </div>
        <div class="form-group">
          <label for="rule-action">Action</label>
          <select id="rule-action" required>
            <option value="allow">Allow</option>
            <option value="block">Block</option>
            <option value="modify">Modify</option>
          </select>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="rule-enabled" checked>
            <span>Enabled</span>
          </label>
        </div>
        <div class="form-actions">
          <button id="save-rule" class="btn btn-primary">Save</button>
          <button id="cancel-rule" class="btn btn-secondary">Cancel</button>
        </div>
      </div>

      <!-- Rules List -->
      <div id="rules-list" class="list">
        <div class="empty-state">No rules configured</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
